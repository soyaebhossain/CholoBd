<form method="post" class="row g-3 settings-section-body">
    {% csrf_token %}
    <input type="hidden" name="action" value="save_section">
    <div class="col-md-4">
        <label class="form-label" for="{{ form.theme_mode.id_for_label }}"><i class="bi bi-circle-half me-1"></i>Theme mode</label>
        {{ form.theme_mode }}
    </div>
    <div class="col-md-4">
        <label class="form-label" for="{{ form.preferred_language.id_for_label }}"><i class="bi bi-translate me-1"></i>Language</label>
        {{ form.preferred_language }}
    </div>
    <div class="col-md-4">
        <label class="form-label" for="{{ form.font_size.id_for_label }}"><i class="bi bi-type me-1"></i>Font size</label>
        {{ form.font_size }}
    </div>
    <div class="col-md-4">
        <label class="form-label" for="{{ form.layout_density.id_for_label }}"><i class="bi bi-grid-3x3-gap me-1"></i>Layout density</label>
        {{ form.layout_density }}
    </div>
    <div class="col-md-6">
        <label class="form-label" for="{{ form.map_style.id_for_label }}"><i class="bi bi-map me-1"></i>Map style preference</label>
        {{ form.map_style }}
    </div>
    <div class="col-12 settings-actions">
        <button class="btn btn-primary" type="submit"><i class="bi bi-check2-circle me-1"></i>Save Appearance Settings</button>
    </div>
</form>
